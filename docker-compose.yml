version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8080
    volumes:
      - ./backend/local_storage:/app/local_storage

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
