<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#3367D6"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#2D9248"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="gYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBC04"/>
      <stop offset="100%" stop-color="#F09D00"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E8552A"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#9AA0A6"/></marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4285F4"/></marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#9C27B0"/></marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F09D00"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#E8552A"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" rx="16" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#202124">Nimora — System Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#5F6368">Gemini Live Agent Challenge · Creative Storyteller Track</text>

  <!-- ═══════════════ USER ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="200" width="140" height="130" rx="14" fill="#fff" stroke="#DADCE0" stroke-width="1.5"/>
    <circle cx="100" cy="240" r="22" fill="#E8F0FE"/>
    <text x="100" y="246" text-anchor="middle" font-size="22">👧</text>
    <text x="100" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">Child</text>
    <text x="100" y="296" text-anchor="middle" font-size="10" fill="#5F6368">Picks choices,</text>
    <text x="100" y="308" text-anchor="middle" font-size="10" fill="#5F6368">listens to story</text>
  </g>

  <!-- Arrow: User → Frontend -->
  <line x1="170" y1="265" x2="218" y2="265" stroke="#9AA0A6" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════ GOOGLE CLOUD PLATFORM BOX ═══════════════ -->
  <rect x="210" y="80" width="870" height="550" rx="14" fill="none" stroke="#4285F4" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="230" y="70" width="220" height="24" rx="4" fill="#4285F4"/>
  <text x="340" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Google Cloud Platform</text>

  <!-- ═══════════════ FRONTEND (Cloud Run) ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="228" y="120" width="200" height="310" rx="12" fill="#fff" stroke="url(#gBlue)" stroke-width="2"/>
    <rect x="228" y="120" width="200" height="36" rx="12" fill="url(#gBlue)"/>
    <rect x="228" y="140" width="200" height="16" fill="url(#gBlue)"/>
    <text x="328" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Flutter Web Frontend</text>
    <text x="328" y="172" text-anchor="middle" font-size="10" fill="#5F6368">Cloud Run · Dart · CanvasKit</text>

    <!-- Screens flow -->
    <rect x="244" y="186" width="168" height="24" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="328" y="203" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">1. Welcome Screen</text>

    <rect x="244" y="216" width="168" height="24" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="328" y="233" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">2. Upload Child Photo</text>

    <rect x="244" y="246" width="168" height="24" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="328" y="263" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">3. Name Your Hero</text>

    <rect x="244" y="276" width="168" height="24" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="328" y="293" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">4. Pick Adventure (theme)</text>

    <rect x="244" y="306" width="168" height="24" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="328" y="323" text-anchor="middle" font-size="10" font-weight="600" fill="#1565C0">5. Pick a Look (art style)</text>

    <text x="328" y="350" text-anchor="middle" font-size="11" fill="#9AA0A6">- - - - - - - - - - - - - -</text>

    <rect x="244" y="360" width="168" height="24" rx="5" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <text x="328" y="377" text-anchor="middle" font-size="10" font-weight="600" fill="#E65100">Story Screen (interactive)</text>

    <rect x="244" y="390" width="168" height="24" rx="5" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1"/>
    <text x="328" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">Completed + PDF Export</text>
  </g>

  <!-- Arrow: Frontend → Backend -->
  <line x1="428" y1="275" x2="498" y2="275" stroke="#4285F4" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="463" y="265" text-anchor="middle" font-size="9" fill="#4285F4" font-weight="600">REST API</text>

  <!-- ═══════════════ BACKEND (Cloud Run) ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="500" y="120" width="240" height="310" rx="12" fill="#fff" stroke="url(#gGreen)" stroke-width="2"/>
    <rect x="500" y="120" width="240" height="36" rx="12" fill="url(#gGreen)"/>
    <rect x="500" y="140" width="240" height="16" fill="url(#gGreen)"/>
    <text x="620" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">FastAPI Backend</text>
    <text x="620" y="172" text-anchor="middle" font-size="10" fill="#5F6368">Cloud Run · Python 3.11 · ADK</text>

    <!-- Routes -->
    <rect x="516" y="186" width="208" height="48" rx="6" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="620" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#2E7D32">API Routes</text>
    <text x="620" y="218" text-anchor="middle" font-size="9" fill="#5F6368">POST /story/start</text>
    <text x="620" y="230" text-anchor="middle" font-size="9" fill="#5F6368">POST /story/{id}/choose · GET /audio</text>

    <!-- Orchestrator -->
    <rect x="516" y="244" width="208" height="42" rx="6" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <text x="620" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#E65100">Story Orchestrator</text>
    <text x="620" y="278" text-anchor="middle" font-size="9" fill="#5F6368">Character Desc → Scene → Choices → Audio</text>

    <!-- ADK Tools -->
    <rect x="516" y="296" width="208" height="38" rx="6" fill="#EDE7F6" stroke="#B39DDB" stroke-width="1"/>
    <text x="620" y="312" text-anchor="middle" font-size="10" font-weight="600" fill="#4527A0">ADK Tool Functions</text>
    <text x="620" y="326" text-anchor="middle" font-size="9" fill="#5F6368">generate_scene · generate_choices · generate_audio</text>

    <!-- Services row -->
    <rect x="516" y="344" width="66" height="28" rx="5" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="549" y="362" text-anchor="middle" font-size="8" font-weight="600" fill="#7B1FA2">Session</text>

    <rect x="588" y="344" width="66" height="28" rx="5" fill="#E0F7FA" stroke="#80DEEA" stroke-width="1"/>
    <text x="621" y="362" text-anchor="middle" font-size="8" font-weight="600" fill="#00838F">Image</text>

    <rect x="660" y="344" width="66" height="28" rx="5" fill="#FFF8E1" stroke="#FFE082" stroke-width="1"/>
    <text x="693" y="362" text-anchor="middle" font-size="8" font-weight="600" fill="#F57F17">Storage</text>

    <text x="620" y="404" text-anchor="middle" font-size="9" fill="#9AA0A6">Pydantic · google-genai · google-adk</text>
  </g>

  <!-- ═══════════════ GEMINI MODELS ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="800" y="100" width="260" height="260" rx="12" fill="#fff" stroke="url(#gPurple)" stroke-width="2"/>
    <rect x="800" y="100" width="260" height="36" rx="12" fill="url(#gPurple)"/>
    <rect x="800" y="120" width="260" height="16" fill="url(#gPurple)"/>
    <text x="930" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Gemini AI Models</text>
    <text x="930" y="154" text-anchor="middle" font-size="10" fill="#5F6368">Google GenAI SDK</text>

    <!-- Model 1: Interleaved -->
    <rect x="816" y="168" width="228" height="48" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="930" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#6A1B9A">gemini-2.5-flash-image</text>
    <text x="930" y="200" text-anchor="middle" font-size="9" fill="#7B1FA2">Interleaved Text + Image in one call</text>
    <text x="930" y="212" text-anchor="middle" font-size="8" fill="#9C27B0">Story narration + illustration together</text>

    <!-- Model 2: Orchestrator -->
    <rect x="816" y="224" width="228" height="40" rx="8" fill="#E8EAF6" stroke="#9FA8DA" stroke-width="1"/>
    <text x="930" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#283593">gemini-2.5-flash</text>
    <text x="930" y="258" text-anchor="middle" font-size="9" fill="#3949AB">Choices generation + character description</text>

    <!-- Model 3: TTS -->
    <rect x="816" y="272" width="228" height="40" rx="8" fill="#E0F2F1" stroke="#80CBC4" stroke-width="1"/>
    <text x="930" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#00695C">gemini-2.5-flash-preview-tts</text>
    <text x="930" y="306" text-anchor="middle" font-size="9" fill="#00897B">Audio narration for each page</text>

    <!-- Key feature -->
    <rect x="816" y="322" width="228" height="26" rx="6" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1"/>
    <text x="930" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#C62828">Single-call multimodal output</text>
  </g>

  <!-- Arrow: Backend → Gemini -->
  <line x1="740" y1="260" x2="800" y2="240" stroke="#9C27B0" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="766" y="240" text-anchor="middle" font-size="9" fill="#9C27B0" font-weight="600" transform="rotate(-8,766,240)">GenAI SDK</text>

  <!-- ═══════════════ CLOUD STORAGE ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="800" y="400" width="260" height="110" rx="12" fill="#fff" stroke="url(#gYellow)" stroke-width="2"/>
    <rect x="800" y="400" width="260" height="36" rx="12" fill="url(#gYellow)"/>
    <rect x="800" y="420" width="260" height="16" fill="url(#gYellow)"/>
    <text x="930" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Google Cloud Storage</text>
    <text x="930" y="458" text-anchor="middle" font-size="10" fill="#5F6368">nimora-stories bucket</text>

    <rect x="840" y="474" width="80" height="26" rx="5" fill="#FFF8E1" stroke="#FFE082" stroke-width="1"/>
    <text x="880" y="491" text-anchor="middle" font-size="9" font-weight="600" fill="#F57F17">Illustrations</text>

    <rect x="940" y="474" width="80" height="26" rx="5" fill="#FFF8E1" stroke="#FFE082" stroke-width="1"/>
    <text x="980" y="491" text-anchor="middle" font-size="9" font-weight="600" fill="#F57F17">Audio WAV</text>
  </g>

  <!-- Arrow: Backend → Storage -->
  <line x1="700" y1="430" x2="800" y2="445" stroke="#F09D00" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
  <text x="746" y="428" text-anchor="middle" font-size="9" fill="#F09D00" font-weight="600">Store/Fetch</text>

  <!-- ═══════════════ USER JOURNEY FLOW (bottom) ═══════════════ -->
  <g filter="url(#shadow)">
    <rect x="228" y="560" width="832" height="110" rx="12" fill="#fff" stroke="#DADCE0" stroke-width="1.5"/>
    <text x="644" y="586" text-anchor="middle" font-size="12" font-weight="700" fill="#202124">User Journey</text>

    <!-- Step 1 -->
    <rect x="244" y="600" width="108" height="52" rx="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="298" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#1565C0">1. Upload Photo</text>
    <text x="298" y="632" text-anchor="middle" font-size="8" fill="#5F6368">Child's photo only</text>
    <text x="298" y="644" text-anchor="middle" font-size="8" fill="#5F6368">+ Name + Theme + Style</text>

    <text x="366" y="628" text-anchor="middle" font-size="16" fill="#9AA0A6">&#8594;</text>

    <!-- Step 2 -->
    <rect x="382" y="600" width="108" height="52" rx="8" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
    <text x="436" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#6A1B9A">2. AI Generates</text>
    <text x="436" y="632" text-anchor="middle" font-size="8" fill="#5F6368">Story text + illustration</text>
    <text x="436" y="644" text-anchor="middle" font-size="8" fill="#5F6368">+ audio (background)</text>

    <text x="504" y="628" text-anchor="middle" font-size="16" fill="#9AA0A6">&#8594;</text>

    <!-- Step 3 -->
    <rect x="520" y="600" width="108" height="52" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="574" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#2E7D32">3. Choose Path</text>
    <text x="574" y="632" text-anchor="middle" font-size="8" fill="#5F6368">2-3 adventure options</text>
    <text x="574" y="644" text-anchor="middle" font-size="8" fill="#5F6368">with themed icons</text>

    <text x="642" y="628" text-anchor="middle" font-size="16" fill="#9AA0A6">&#8594;</text>

    <!-- Step 4 -->
    <rect x="658" y="600" width="108" height="52" rx="8" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
    <text x="712" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#E65100">4. Repeat x 5-6</text>
    <text x="712" y="632" text-anchor="middle" font-size="8" fill="#5F6368">Pages until happy</text>
    <text x="712" y="644" text-anchor="middle" font-size="8" fill="#5F6368">ending</text>

    <text x="780" y="628" text-anchor="middle" font-size="16" fill="#9AA0A6">&#8594;</text>

    <!-- Step 5 -->
    <rect x="796" y="600" width="108" height="52" rx="8" fill="#FCE4EC" stroke="#F48FB1" stroke-width="1"/>
    <text x="850" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#C62828">5. The End!</text>
    <text x="850" y="632" text-anchor="middle" font-size="8" fill="#5F6368">Swipe all pages</text>
    <text x="850" y="644" text-anchor="middle" font-size="8" fill="#5F6368">Download as PDF</text>

    <!-- Loop arrow (step 3 back to step 2) -->
    <path d="M 574,598 C 574,582 436,582 436,598" fill="none" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>

    <!-- New story arrow -->
    <rect x="920" y="610" width="120" height="30" rx="6" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="980" y="630" text-anchor="middle" font-size="9" fill="#2E7D32">Start New Story</text>
    <path d="M 920,625 C 900,625 900,650 280,650 C 260,650 244,640 244,628" fill="none" stroke="#A5D6A7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  </g>

  <!-- Footer -->
  <text x="550" y="740" text-anchor="middle" font-size="10" fill="#9AA0A6">Nimora · Gemini Live Agent Challenge — Creative Storyteller Track · 2026</text>
</svg>
